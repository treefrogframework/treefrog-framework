        vars:
          AUTH: auth
          LOAD_BALANCER: "on"
          MONGODB_VERSION: "5.0"
          SSL: openssl
          TOPOLOGY: sharded_cluster
      - func: run-simple-http-server
      - func: start-load-balancer
        vars:
          MONGODB_URI: mongodb://localhost:27017,localhost:27018
      - func: run-tests
        vars:
