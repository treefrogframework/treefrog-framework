    run_on:
      - amazon2
      - debian11-latest-large
      - debian12-latest-large
      - ubuntu2204-large
      - ubuntu2404-large
    tags: [packaging, pr-merge-gate]
    commands:
      - func: docker-login-amazon-ecr
      - command: subprocess.exec
        type: test
        params:
          binary: ./tools/earthly.sh
          working_dir: mongoc
          include_expansions_in_env:
            - DOCKER_CONFIG
          args:
            - --buildkit-image=901841024863.dkr.ecr.us-east-1.amazonaws.com/dockerhub/earthly/buildkitd:v0.8.3
            - --platform=linux/amd64
            - +deb.test
            - --default_search_registry=901841024863.dkr.ecr.us-east-1.amazonaws.com/dockerhub/library
